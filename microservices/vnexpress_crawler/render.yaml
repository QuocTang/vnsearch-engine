services:
  - type: web
    name: vnexpress-crawler
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DEBUG
        value: "False"
      - key: VNEXPRESS_BASE_URL
        value: "https://vnexpress.net"
      - key: VNEXPRESS_MICROSERVICE_URL
        value: "https://vnexpress.net/microservice"
      - key: VNEXPRESS_GW_URL
        value: "https://gw.vnexpress.net"
      - key: REQUEST_TIMEOUT
        value: "10"
      - key: MAX_RETRIES
        value: "3"
      - key: CACHE_CATEGORIES
        value: "3600"
      - key: CACHE_ARTICLES
        value: "300"
