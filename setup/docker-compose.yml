version: "3.8"

services:
  postgres:
    image: postgres:18
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - ./metadata/postgres:/var/lib/postgresql
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - main-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    hostname: n8n
    user: root
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - ./metadata/n8n:/home/node/.n8n
    networks:
      - main-network
    depends_on:
      - postgres

networks:
  main-network:
    external: true
