version: "3.8"

services:
  postgres:
    image: postgres:18
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - ./metadata/postgres:/var/lib/postgresql
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - main-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    hostname: n8n
    user: root
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
    volumes:
      - ./metadata/n8n:/home/node/.n8n
    networks:
      - main-network
    depends_on:
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    hostname: qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    volumes:
      - ./metadata/qdrant/storage:/qdrant/storage
      - ./metadata/qdrant/snapshots:/qdrant/snapshots
    networks:
      - main-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:6333/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G
    restart: unless-stopped

  irs_api:
    image: quoctang/vnsearch-irs_api:latest
    container_name: irs_api
    hostname: irs_api
    ports:
      - "8000:8000" # API port
    environment:
      # Qdrant configuration
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=articles

      # API configuration
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_RELOAD=false

      # Data paths (inside container)
      - EXCEL_ARTICLES_PATH=/app/assets/excel/articles.xlsx
      - EXCEL_CATEGORIES_PATH=/app/assets/excel/categories.xlsx
      - EXCEL_COMMENTS_PATH=/app/assets/excel/comments.xlsx
      - STOPWORDS_PATH=/app/assets/txt/vietnamese-stopwords.txt
      - TFIDF_MODEL_PATH=/app/models/tfidf_vectorizer.pkl
    volumes:
      # Mount models directory for persistence
      - ../microservices/irs_api/models:/app/models
    networks:
      - main-network
    # depends_on:
    #   qdrant:
    #     condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8000/', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s # Give time for model loading
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  irs_web:
    image: quoctang/vnsearch-irs_web:latest
    container_name: irs_web
    hostname: irs_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000 # Client-side uses localhost
      - NEXT_PUBLIC_APP_NAME="IRS Search"
      - NEXT_PUBLIC_APP_URL="http://localhost:3000"
    networks:
      - main-network
    # depends_on:
    #   - irs_api
    restart: unless-stopped

networks:
  main-network:
    external: true
